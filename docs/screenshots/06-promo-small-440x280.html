<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>JobFill — Small promo tile (440×280)</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f6f6f6;
  }

  .tile {
    width: 440px;
    height: 280px;
    background: #111827;
    color: #f9fafb;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 32px 36px;
  }

  /* Soft brand glow in the corner — subtle, never overpowers the wordmark */
  .tile::before {
    content: "";
    position: absolute;
    right: -120px; bottom: -120px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(45, 212, 191, 0.18), transparent 60%);
    pointer-events: none;
  }

  .brand-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .logo-mark {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    background: #1f2937;
    border: 1px solid #374151;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.04em;
    color: #f9fafb;
  }
  .wordmark {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .tagline {
    font-size: 22px;
    font-weight: 600;
    line-height: 1.25;
    letter-spacing: -0.01em;
    margin: 0 0 14px;
    max-width: 340px;
  }

  .ats-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .ats {
    font-size: 11px;
    color: #d1d5db;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 999px;
    padding: 3px 9px;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<div class="tile">
  <div class="brand-row">
    <span class="logo-mark">JF</span>
    <span class="wordmark">JobFill</span>
  </div>
  <p class="tagline">Autofill job applications, fast.</p>
  <div class="ats-row">
    <span class="ats">Greenhouse</span>
    <span class="ats">Lever</span>
    <span class="ats">Workday</span>
  </div>
</div>

</body>
</html>
